services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: genfren
      POSTGRES_USER: genfren
      POSTGRES_PASSWORD: genfren
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 4000
      DATABASE_URL: postgres://genfren:genfren@postgres:5432/genfren
      REDIS_URL: redis://redis:6379
    ports:
      - "${API_PORT:-4101}:4000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://genfren:genfren@postgres:5432/genfren
      REDIS_URL: redis://redis:6379

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-4100}:3000"

volumes:
  postgres_data:
  redis_data:
